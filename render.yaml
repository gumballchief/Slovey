# Render blueprint: Next.js web + always-on pg-boss worker, sharing one env group.
# DB + Auth are Supabase (Postgres + pgvector + Supabase Auth). Deploy: Render
# dashboard → New → Blueprint → this repo. Set every `sync: false` var (the
# secrets) in the dashboard after the first apply.
services:
  - type: web
    name: company-brain-web
    runtime: docker
    dockerfilePath: ./Dockerfile.web
    plan: starter # always-on; the webhook receiver must not cold-start (<2s ack)
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - fromGroup: company-brain
      # Set to the web service's public URL once it's assigned (also add it to
      # Supabase Auth → URL Configuration as Site URL + redirect):
      - key: APP_BASE_URL
        sync: false

  - type: worker # Render's Background Worker type — no HTTP port, just runs
    name: company-brain-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    plan: starter # must stay up for the queue + rescan/refresh cron
    autoDeploy: true
    envVars:
      - fromGroup: company-brain
      # Runs a prebuilt `node` bundle (not tsx), so the ~50-80MB esbuild/runtime
      # overhead is gone. Keep the heap cap as a safety net so GC kicks in before
      # the 512MB Starter limit OOM-kills the container.
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
      # Small connection pools — the worker is low-volume and memory-constrained,
      # and pg-boss opens its own pool on top of the postgres.js client pool.
      - key: DB_POOL_MAX
        value: "4"
      - key: PGBOSS_MAX
        value: "4"

envVarGroups:
  - name: company-brain
    envVars:
      # Non-secrets (committed values are fine):
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      # Cheap tier = the FAST model (security-review, categorization). 3.5-flash
      # is a thinking model (~2min/call); 2.5-flash answers in seconds.
      - key: GEMINI_MODEL_CHEAP
        value: gemini-2.5-flash
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: EMBEDDING_DIMENSIONS
        value: "1024"
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: GITHUB_APP_SLUG
        value: company-brain
      - key: ALLOWLIST_REPOS
        value: "" # empty = unrestricted in production; set a list to scope
      - key: RESCAN_CRON
        value: 0 */6 * * *
      - key: REFRESH_CRON
        value: 0 3 * * *
      # Secrets — set in the Render dashboard, never commit:
      - key: DATABASE_URL # Supabase session-pooler string (?sslmode=require)
        sync: false
      # Optional: Supabase TRANSACTION-pooler string (same host, port 6543).
      # App query pools use it when set — no 15-session cap, so web instances
      # can scale horizontally. pg-boss + migrations stay on DATABASE_URL.
      # CAUTION: raise the transaction pooler's pool size + check the role's
      # statement_timeout in Supabase first; defaults kill queued queries
      # under load (57014). Load-test before enabling (see DEPLOY.md).
      - key: DATABASE_URL_POOLED
        sync: false
      # Supabase Auth + client. NEXT_PUBLIC_* are inlined at build time (public
      # by design); the service-role key is a true secret (server-only).
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY # PEM with literal \n, or use *_PATH
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: TOKEN_ENCRYPTION_KEY # AES-256-GCM key, 32 bytes base64
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
