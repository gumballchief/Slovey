<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0f15"/>
      <stop offset="1" stop-color="#0a0b10"/>
    </linearGradient>
    <linearGradient id="s2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#2E9BF5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" rx="18" fill="url(#bg2)"/>
  <rect x="0.5" y="0.5" width="1199" height="749" rx="18" fill="none" stroke="#232733"/>
  <!-- top bar -->
  <rect x="0" y="0" width="1200" height="64" rx="18" fill="#12141c"/>
  <rect x="0" y="46" width="1200" height="18" fill="#12141c"/>
  <text x="34" y="40" fill="url(#s2)" font-size="26" font-weight="800" font-family="Georgia, serif">S</text>
  <text x="66" y="40" fill="#e8eaf0" font-size="18" font-weight="600">Ask Slovey</text>
  <rect x="1050" y="20" width="120" height="26" rx="13" fill="#14171f" stroke="#232733"/>
  <text x="1068" y="38" fill="#8b90a6" font-size="13">nft-studio</text>
  <!-- user bubble (right) -->
  <rect x="640" y="112" width="520" height="58" rx="14" fill="#1b1f2b"/>
  <text x="666" y="147" fill="#dfe2ea" font-size="17">Why do we use Gemini instead of OpenAI?</text>
  <!-- assistant bubble (left) -->
  <rect x="40" y="204" width="740" height="270" rx="14" fill="#101017" stroke="#20242e"/>
  <text x="66" y="176" fill="#7b8093" font-size="13" letter-spacing="1">SLOVEY</text>
  <text x="66" y="246" fill="#c9ccd6" font-size="17">The team switched the LLM provider to Gemini for cost and</text>
  <text x="66" y="274" fill="#c9ccd6" font-size="17">latency on long-context reasoning over the decision graph.</text>
  <text x="66" y="302" fill="#c9ccd6" font-size="17">OpenAI was evaluated but rejected on per-token price at the</text>
  <text x="66" y="330" fill="#c9ccd6" font-size="17">expected request volume.</text>
  <!-- citation chip -->
  <rect x="66" y="360" width="470" height="82" rx="10" fill="#0c1420" stroke="#1c3a5e"/>
  <circle cx="92" cy="392" r="5" fill="#2E9BF5"/>
  <text x="112" y="388" fill="#8ec5ff" font-size="14" font-weight="600">Decision · Adopt Gemini as the LLM provider</text>
  <text x="112" y="414" fill="#7b8093" font-size="13">cited from PR #41 — "swap provider abstraction"</text>
  <text x="112" y="432" fill="#5a5f70" font-size="12">confidence 0.92 · 2 supporting decisions</text>
  <!-- streaming caret -->
  <rect x="66" y="454" width="10" height="20" rx="2" fill="#7C3AED"/>
  <!-- input -->
  <rect x="40" y="640" width="1120" height="60" rx="14" fill="#0c0e14" stroke="#232733"/>
  <text x="66" y="676" fill="#6a6f80" font-size="17">Ask about any decision, file, or PR…</text>
  <rect x="1076" y="652" width="68" height="36" rx="9" fill="#f1f2f4"/>
  <text x="1098" y="676" fill="#111319" font-size="16" font-weight="600">↑</text>
  <text x="1120" y="200" fill="#5a5f70" font-size="13" text-anchor="end">preview</text>
</svg>
